<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="shieldA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="shieldB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="darkShape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <pattern id="microDots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#6366f1" opacity="0.25"/>
    </pattern>
  </defs>
  
  <!-- Light base -->
  <rect width="1920" height="1080" fill="#f8fafc"/>
  
  <!-- Top right large filled shield -->
  <g transform="translate(1700, 180) rotate(15)">
    <path d="M 0 -120 L 90 -80 L 90 30 Q 90 110 0 160 Q -90 110 -90 30 L -90 -80 Z" 
          fill="url(#shieldA)"/>
  </g>
  
  <!-- Top middle envelope -->
  <g transform="translate(1180, 140) rotate(-8)">
    <rect x="-70" y="-45" width="140" height="90" rx="8" fill="url(#shieldB)"/>
    <path d="M -70 -45 L 0 15 L 70 -45" stroke="white" stroke-width="4" fill="none" opacity="0.9"/>
  </g>
  
  <!-- Bottom right large dark hexagon -->
  <g transform="translate(1620, 820)">
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="url(#darkShape)"/>
    <!-- Lock icon inside -->
    <g opacity="0.9">
      <rect x="-25" y="-10" width="50" height="40" rx="5" fill="#6366f1"/>
      <path d="M -16 -10 L -16 -25 Q -16 -42 0 -42 Q 16 -42 16 -25 L 16 -10" 
            fill="none" stroke="#6366f1" stroke-width="5"/>
      <circle cx="0" cy="8" r="4" fill="white"/>
    </g>
  </g>
  
  <!-- Middle right small filled circle -->
  <circle cx="1850" cy="500" r="55" fill="url(#hexGrad)"/>
  
  <!-- Middle right triangle -->
  <g transform="translate(1450, 540) rotate(20)">
    <polygon points="0,-65 60,40 -60,40" fill="#fbbf24" opacity="0.85"/>
  </g>
  
  <!-- Outlined ring (large) right side -->
  <circle cx="1380" cy="780" r="75" fill="none" stroke="#6366f1" stroke-width="4" opacity="0.4"/>
  <circle cx="1380" cy="780" r="50" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
  
  <!-- Outlined hexagon top right -->
  <g transform="translate(1880, 260)">
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.45"/>
  </g>
  
  <!-- Squiggle / connection line -->
  <path d="M 1280 400 Q 1380 350 1480 420 T 1680 380" 
        fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Dashed connection arc -->
  <path d="M 1500 200 Q 1700 350 1750 600" 
        fill="none" stroke="#0f172a" stroke-width="2" stroke-dasharray="6 10" opacity="0.25"/>
  
  <!-- Bottom middle small shield outline -->
  <g transform="translate(1280, 940)">
    <path d="M 0 -45 L 35 -30 L 35 10 Q 35 40 0 60 Q -35 40 -35 10 L -35 -30 Z" 
          fill="none" stroke="#0f172a" stroke-width="3" opacity="0.5"/>
  </g>
  
  <!-- Small filled dots scattered -->
  <circle cx="1320" cy="280" r="8" fill="#fbbf24"/>
  <circle cx="1750" cy="700" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="1200" cy="700" r="5" fill="#6366f1"/>
  <circle cx="1820" cy="940" r="7" fill="#818cf8"/>
  <circle cx="1550" cy="380" r="4" fill="#6366f1" opacity="0.6"/>
  
  <!-- Tiny accent shapes on light/left side -->
  <circle cx="220" cy="200" r="40" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
  <circle cx="350" cy="900" r="6" fill="#6366f1" opacity="0.4"/>
  <circle cx="180" cy="700" r="4" fill="#818cf8" opacity="0.5"/>
  
  <!-- Subtle dot pattern strip on right edge -->
  <rect x="1820" y="0" width="100" height="1080" fill="url(#microDots)"/>
</svg>
