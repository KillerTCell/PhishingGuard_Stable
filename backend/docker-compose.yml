version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phishguard
      POSTGRES_USER: phishguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishguard -d phishguard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ─────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - exports:/mnt/exports
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Worker ───────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      -Q analysis,digest,forwarding,export,maintenance,imap
      --loglevel=info
      --concurrency=4
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - exports:/mnt/exports

  # ── Celery Beat Scheduler ───────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── nginx (TLS 1.3 terminator + export file server) ─────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - exports:/mnt/exports:ro
    depends_on:
      - api

  # ── Flower (Celery monitoring) ──────────────────────────────
  flower:
    build: .
    restart: unless-stopped
    command: celery -A app.tasks.celery_app flower --port=5555
    env_file: .env
    depends_on:
      - redis
    ports:
      - "5555:5555"

  # ── PostgreSQL backup (daily pg_dump) ───────────────────────
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data:ro
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump -h postgres -U phishguard phishguard
          > /backups/phishguard_$$(date +%Y%m%d_%H%M%S).sql;
        find /backups -name '*.sql' -mtime +7 -delete;
        sleep 86400;
      done"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  exports:
  ssl_certs:
