# ============================================================
# PhishGuard — Alembic configuration
# sqlalchemy.url is intentionally blank — env.py reads
# settings.DATABASE_URL directly from the Pydantic Settings.
# ============================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Leave blank — env.py injects settings.DATABASE_URL at runtime
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
