# ============================================================
# PhishGuard — nginx 1.25 configuration
# NFR-2: TLS 1.3 ONLY. No TLS 1.2.
# Handles: HTTPS termination, API proxy, SSE streaming,
#          X-Accel-Redirect for export file downloads.
# ============================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Security Headers (applied globally) ──────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (TLS 1.3 only) ──────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;
        http2 on;

        # Certificates (mounted as Docker volume)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # NFR-2: TLS 1.3 only — no TLS 1.2 allowed
        ssl_protocols TLSv1.3;

        # AEAD ciphers only (TLS 1.3 mandates these; explicit for clarity)
        ssl_ciphers ECDHE+AESGCM;
        ssl_prefer_server_ciphers off;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── API proxy (all /api/* routes) ────────────────────
        location /api/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for SSE (Section 6.2) — keep connection open 5 min
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_connect_timeout  10s;

            # Disable buffering for SSE streaming responses
            proxy_buffering    off;
            proxy_cache        off;

            # Keep-alive to upstream
            proxy_set_header Connection "";
        }

        # ── Internal export file serving (Section 4.8) ───────
        # FastAPI's GET /settings/export/{id} sets X-Accel-Redirect header.
        # nginx intercepts and serves the file directly from the volume,
        # bypassing the Python process for large binary transfers.
        location /protected-exports/ {
            internal;
            alias /mnt/exports/;
        }

        # ── Health check (pass-through, no auth) ─────────────
        location /health {
            proxy_pass http://api:8000/health;
            proxy_read_timeout 5s;
        }

        # ── Block direct access to everything else ────────────
        location / {
            return 404;
        }
    }
}
